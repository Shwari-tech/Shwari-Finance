<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#001208">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shwari Finance">
    <title>Shwari Finance · Digital Assimilation</title>
    
    <link rel="preload" as="image" href="https://shwarimoversandcleaners.co.ke/wp-content/uploads/2022/02/BOB_1049.jpg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%; width: 100%;
            background: url('https://shwarimoversandcleaners.co.ke/wp-content/uploads/2022/02/BOB_1049.jpg') calc(50% + 30%) center / cover no-repeat;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: relative; perspective: 1200px;
            -webkit-text-size-adjust: 100%; -moz-text-size-adjust: 100%; text-size-adjust: 100%;
            background-color: #001208;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        html { font-size: 5px !important; }

        .wrapper {
            position: absolute; width: min(500px, 92vw); height: min(500px, 92vw);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transform: scale(0.8);
            transition: opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d; will-change: transform, opacity;
            z-index: 10;
        }
        .wrapper.pop-in { opacity: 1; transform: scale(1); }

        .main-icon {
            position: relative; width: 120px; height: 120px; border-radius: 50%;
            background: transparent;
            display: flex; justify-content: center; align-items: center;
            z-index: 60; will-change: transform;
        }

        /* Fast Core Animation */
        .core-animation {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0);
        }

        .wrapper.pull-active .core-animation {
            opacity: 1;
            transform: scale(1);
            transition: all 0.3s ease;
        }

        .core-outer {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: #55d082;
            border-right-color: #2c7a47;
            border-bottom-color: #55d082;
            border-left-color: #2c7a47;
            border-radius: 50%;
            animation: coreSpin 2s linear infinite;
        }

        .core-inner {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, #55d082 0%, #2c7a47 70%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(85, 208, 130, 0.8);
        }

        @keyframes coreSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-ring {
            position: absolute; inset: -6px; border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #55d082; border-bottom-color: #2c7a47; border-radius: 50%;
            opacity: 0;
        }

        .shockwave { 
            position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; 
            border-radius: 50%; border: 1px solid rgba(85, 208, 130, 0.3); 
            transform: translate(-50%, -50%) scale(0.5); opacity: 0; 
            z-index: 10; pointer-events: none; 
        }
        
        .particle { 
            position: absolute; border-radius: 50%; opacity: 0; 
            z-index: 20; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            will-change: transform, top, left, opacity; 
        }
        .wrapper.pop-in .particle { opacity: 0.4; }
        .p1 { width: 8px; height: 8px; top: 15%; left: 25%; background: #55d082; }
        .p2 { width: 6px; height: 6px; top: 75%; left: 75%; background: #ffffff; }
        .p3 { width: 10px; height: 10px; top: 70%; left: 20%; background: #b78a1a; }
        .p4 { width: 6px; height: 6px; top: 30%; left: 80%; background: #dddddd; }

        /* Fast Inward Pull (0.4s) */
        .wrapper.pull-active .particle { 
            top: 50% !important; left: 50% !important; 
            transform: translate(-50%, -50%) scale(0) !important; opacity: 0 !important; 
            transition-duration: 0.3s !important;
        }
        
        .wrapper.pull-active .main-icon { 
            animation: fastImplode 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }

        @keyframes fastImplode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Fast Outward Reveal */
        .app { 
            position: fixed; inset: 0; opacity: 0; visibility: hidden; 
            background: #001208; z-index: 2000; 
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        
        .app.active { 
            opacity: 1; visibility: visible; transform: scale(1);
        }
        
        iframe { 
            width: 100%; height: 100%; border: none; 
            background: #001208; opacity: 0;
            transition: opacity 0.3s ease 0.1s;
            padding-top: env(safe-area-inset-top);
        }
        
        .app.active iframe { opacity: 1; }

        #continue-overlay {
            position: fixed; inset: 0; z-index: 50; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: opacity 0.4s ease;
        }
        #continue-overlay.hidden { display: none; opacity: 0; }

        .continue-header { 
            padding: 40px 20px; text-align: center; 
            padding-top: max(40px, env(safe-area-inset-top)); 
        }
        .dept-title { 
            font-size: 24px; font-weight: 900; color: #ffffff; 
            text-transform: uppercase; letter-spacing: 2px; line-height: 1.3; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .dept-subtitle { 
            font-size: 12px; color: #55d082; letter-spacing: 4px; 
            text-transform: uppercase; margin-top: 8px; font-weight: 700; 
        }

        .continue-footer {
            padding: 60px 20px 30px; text-align: center;
            background: linear-gradient(to top, rgba(0, 15, 8, 0.9) 0%, rgba(0, 15, 8, 0.6) 50%, transparent 100%);
            position: relative;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
        }

        .elephant-gate {
            position: absolute;
            bottom: max(60px, calc(30px + env(safe-area-inset-bottom)));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 10;
        }

        .elephant-gate.unlocked {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }

        .elephant-icon {
            font-size: 60px;
            color: #C9A961;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: subtleFloat 2s ease-in-out infinite;
        }

        @keyframes subtleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .employee-info {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 5;
        }

        .employee-info.unlocked {
            opacity: 1;
            transform: translateY(0);
        }

        .medium-font { 
            font-size: 20px !important; color: #ffffff; font-weight: 800; 
            margin-bottom: 4px; line-height: 1.2; 
        }
        .small-email { 
            font-size: 13px; color: #aaaaaa; font-weight: 500; 
        }

        #auth-portal {
            position: fixed; inset: 0; z-index: 1000; 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; padding-top: env(safe-area-inset-top);
            background: rgba(0, 20, 10, 0.8); 
            backdrop-filter: blur(12px); 
            transition: opacity 0.4s ease;
        }
        #auth-portal.hidden { display: none; opacity: 0; pointer-events: none; }

        .auth-card {
            width: 100%; max-width: 340px; 
            padding: 32px 24px; 
            border-radius: 20px;
            background: rgba(255,255,255,0.98);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            text-align: center;
            animation: cardFloatUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Inter', sans-serif;
        }
        
        @keyframes cardFloatUp { 
            from { transform: translateY(20px) scale(0.98); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }
        
        .auth-card.hidden { display: none; }

        .auth-icon i { 
            font-size: 40px; margin-bottom: 16px; 
            color: #2c7a47;
        }
        
        .auth-card h2 { 
            font-size: 22px; color: #111; font-weight: 800; 
            margin-bottom: 4px; 
        }
        
        .desc-text { 
            font-size: 13px; color: #666; margin-bottom: 20px; 
        }

        .input-group input { 
            width: 100%; padding: 14px 16px; margin-bottom: 12px; 
            border: 1.5px solid #e2e8f0; border-radius: 12px; 
            font-size: 16px; font-family: 'Inter', sans-serif; 
            color: #333; background: #f8fafc; 
            transition: all 0.2s ease; 
            -webkit-appearance: none; 
        }
        
        .input-group input:focus { 
            border-color: #2c7a47; outline: none; background: #fff; 
            box-shadow: 0 2px 8px rgba(44, 122, 71, 0.1); 
        }

        .auth-btn { 
            width: 100%; padding: 16px; 
            background: #2c7a47; color: white; border: none; 
            border-radius: 12px; font-size: 16px; font-weight: 700; 
            cursor: pointer; 
            transition: transform 0.15s, background 0.2s;
            margin-top: 4px;
        }
        
        .auth-btn:active { transform: scale(0.98); background: #236b3c; }

        #device-error { 
            display: none; position: fixed; inset: 0; 
            background: #001208; z-index: 10000; 
            flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 40px 30px; font-family: 'Inter', sans-serif; 
        }
        
        .error-card { 
            background: rgba(255,255,255,0.05); 
            max-width: 360px; padding: 32px 24px; 
            border-radius: 16px; 
        }
        
        .error-card h2 { 
            font-size: 20px; color: #55d082; font-weight: 800; 
            margin: 16px 0 8px; 
        }
        
        .error-card p { 
            font-size: 14px; color: #888; line-height: 1.5; 
        }
        
        @media screen and (orientation: landscape), screen and (min-width: 600px) { 
            body > *:not(#device-error) { display: none !important; } 
            #device-error { display: flex !important; } 
        }

        #forcedInstall { 
            display: none; position: fixed; inset: 0; 
            background: #001208; z-index: 9999; 
            justify-content: center; align-items: center; 
            padding: 20px; 
        }
        
        .install-card { 
            background: rgba(255,255,255,0.05); 
            width: 100%; max-width: 320px; 
            padding: 32px 24px; border-radius: 20px; 
            text-align: center; font-family: 'Inter', sans-serif; 
        }
        
        .install-card h2 { 
            color: #fff; font-size: 20px; font-weight: 800; 
            margin: 16px 0 8px; 
        }
        
        .install-card p { 
            color: #888; font-size: 14px; margin-bottom: 24px; 
            line-height: 1.5;
        }
        
        .install-btn { 
            background: #2c7a47; color: #fff; border: none; 
            padding: 14px 0; width: 100%; border-radius: 10px; 
            font-size: 16px; font-weight: 700; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            gap: 8px; transition: all 0.2s;
        }
        
        .install-btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="device-error">
        <div class="error-card">
            <i class="fas fa-mobile-screen" style="font-size:48px; color:#55d082;"></i>
            <h2>Mobile Portrait Only</h2>
            <p>Shwari Finance is optimized for mobile devices in portrait mode.</p>
        </div>
    </div>

    <div id="forcedInstall">
        <div class="install-card">
            <i class="fas fa-mobile-screen-button" style="font-size:48px; color:#55d082;"></i>
            <h2>Install to Continue</h2>
            <p>For security, Shwari Finance must be installed as an app.</p>
            <button class="install-btn" id="installAction">
                <i class="fas fa-download"></i> Install Now
            </button>
        </div>
    </div>

    <div id="auth-portal" class="hidden">
        <div id="reg-screen" class="auth-card hidden">
            <div class="auth-icon"><i class="fas fa-fingerprint"></i></div>
            <h2>Activate Device</h2>
            <p class="desc-text">Register once to secure access.</p>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Full Name" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Work Email" autocomplete="off">
            </div>
            <button onclick="handleRegister()" class="auth-btn">Continue</button>
        </div>
    </div>

    <div id="continue-overlay" class="hidden">
        <div class="continue-header">
            <h3 class="dept-title">Shwari Finance</h3>
            <p class="dept-subtitle">Secure Portal</p>
        </div>
        <div class="continue-footer">
            <div id="elephant-gate" class="elephant-gate">
                <i class="fas fa-elephant elephant-icon"></i>
            </div>
            <div id="employee-info" class="employee-info">
                <h2 id="display-name" class="medium-font"></h2>
                <p id="display-email" class="small-email"></p>
            </div>
        </div>
    </div>

    <div class="wrapper" id="ui">
        <div class="shockwave"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="main-icon">
            <div class="loader-ring"></div>
            <div class="core-animation">
                <div class="core-outer"></div>
                <div class="core-inner"></div>
            </div>
        </div>
    </div>

    <div class="app" id="app">
        <iframe id="macro-frame"></iframe>
    </div>

    <script>
    (function () {
        "use strict";
        
        const MACRO_URL = "https://script.google.com/macros/s/AKfycbyfWRNzWAIdwm30l4I_M_Wj6FlVT2ToNY1LjJr3riHiud5Y2JnFw8XfrHwZBtKjZQwY/exec";
        const macroIframe = document.getElementById('macro-frame');
        
        // Preload early
        macroIframe.src = MACRO_URL + "?cb=" + Date.now();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(r => console.log('SW ready'))
                    .catch(e => console.log('SW error'));
            });
        }

        const uiWrapper = document.getElementById('ui');
        const appPanel = document.getElementById('app');
        let isParallaxActive = true;
        let rafId;

        const onPointerMove = (e) => {
            if (!isParallaxActive) return;
            const cx = e.clientX ?? e.touches?.[0]?.clientX ?? window.innerWidth / 2;
            const cy = e.clientY ?? e.touches?.[0]?.clientY ?? window.innerHeight / 2;
            const targetX = (window.innerWidth / 2 - cx) / 50;
            const targetY = (window.innerHeight / 2 - cy) / 50;
            uiWrapper.style.transform = `rotateY(${targetX}deg) rotateX(${-targetY}deg)`;
        };

        const tickParallax = () => {
            if (!isParallaxActive) return;
            rafId = requestAnimationFrame(tickParallax);
        };

        document.addEventListener('mousemove', onPointerMove, { passive: true });
        document.addEventListener('touchmove', onPointerMove, { passive: true });

        const formatName = (str) => {
            if (!str) return "";
            return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        };

        const isPWA = () => {
            return window.matchMedia('(display-mode: standalone)').matches || 
                   window.navigator.standalone === true || 
                   document.referrer.includes('android-app://');
        };

        window.initAuth = () => {
            if (!isPWA()) {
                document.getElementById('forcedInstall').style.display = 'flex';
                return;
            }
            
            const isRegistered = localStorage.getItem('shwari_registered');
            
            if (isRegistered === 'true') {
                document.getElementById('display-name').innerText = formatName(localStorage.getItem('emp_name'));
                document.getElementById('display-email').innerText = localStorage.getItem('emp_email');
                document.getElementById('continue-overlay').classList.remove('hidden');
                
                // Fast 2s sequence
                setTimeout(() => {
                    document.getElementById('elephant-gate').classList.add('unlocked');
                    document.getElementById('employee-info').classList.add('unlocked');
                }, 1500);
                
                setTimeout(() => {
                    handleContinue();
                }, 2500);
            } else {
                document.getElementById('auth-portal').classList.remove('hidden');
                document.getElementById('reg-screen').classList.remove('hidden');
            }
        };

        window.handleRegister = () => {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim().toLowerCase();
            
            if (name && email) {
                localStorage.setItem('emp_name', name);
                localStorage.setItem('emp_email', email);
                localStorage.setItem('shwari_registered', 'true');
                
                // Instant transition
                document.getElementById('reg-screen').style.opacity = '0';
                setTimeout(() => {
                    location.reload();
                }, 200);
            } else {
                alert("Please enter both fields");
            }
        };

        window.handleContinue = () => {
            const overlay = document.getElementById('continue-overlay');
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                executeFastTransition();
            }, 300);
        };

        const executeFastTransition = () => {
            if (!isParallaxActive) return;
            isParallaxActive = false;
            cancelAnimationFrame(rafId);
            
            // Stop parallax instantly
            uiWrapper.style.transform = 'none';
            uiWrapper.style.transition = 'transform 0.3s ease';
            
            // Trigger fast inward pull (0.4s)
            requestAnimationFrame(() => {
                uiWrapper.classList.add('pull-active');
            });
            
            // Reveal macro immediately (0.3s delay)
            setTimeout(() => {
                appPanel.classList.add('active');
                
                // Cleanup
                setTimeout(() => {
                    uiWrapper.remove();
                }, 300);
            }, 350);
        };

        let deferredPrompt;
        const installOverlay = document.getElementById('forcedInstall');
        const installBtn = document.getElementById('installAction');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isPWA()) installOverlay.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installOverlay.style.display = 'none';
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installOverlay.style.display = 'none';
            location.reload();
        });

        // Start
        requestAnimationFrame(() => {
            uiWrapper.classList.add('pop-in');
            tickParallax();
            window.initAuth();
        });
    })();
    </script>
</body>
</html>
