<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shwari Finance">
    <title>Shwari Finance · Digital Assimilation</title>
    
    <link rel="preload" as="image" href="https://shwarimoversandcleaners.co.ke/wp-content/uploads/2022/02/BOB_1049.jpg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        /* [PASTE ALL YOUR EXISTING CSS FROM <style> TO </style> HERE] */
        /* I omitted it here to save space, but keep your original CSS untouched */
        html { font-size: 5px !important; }
    </style>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="device-error">
        </div>

    <div id="auth-portal" class="hidden">
        
        <div id="reg-screen" class="auth-card hidden">
            <div class="auth-icon"><i class="fas fa-shield-alt"></i></div>
            <h2>Device Activation</h2>
            <p>Register once to secure this device.</p>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Full Name (e.g. Emilio Thuku)" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Work Email" autocomplete="off">
            </div>
            <button onclick="handleRegister()" class="auth-btn">Activate Device</button>
        </div>

        <div id="login-screen" class="auth-card hidden">
            <div class="auth-avatar"><i class="fas fa-user-check"></i></div>
            <p class="welcome-label">Welcome back,</p>
            <h2 id="display-name" class="medium-font"></h2>
            <p id="display-email" class="small-email"></p>
            
            <button onclick="handleContinue()" class="auth-btn">
                <span>Continue</span> <i class="fas fa-arrow-right"></i>
            </button>
            
            <p class="reset-link" onclick="resetDevice()">Not you? Reset Device</p>
        </div>
    </div>
    <div class="wrapper" id="ui">
        </div>

    <div class="app" id="app">
        <iframe id="macro-frame"></iframe>
    </div>

    <div id="forcedInstall">
        </div>

    <script src="app.js"></script>

    <script>
    (function () {
        "use strict";

        /* ── 1. SERVICE WORKER ── */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(r  => console.log('SW registered:', r.scope))
                    .catch(e => console.error('SW failed:', e));
            });
        }

        /* ── 5. STABLE PARALLAX (Unchanged) ── */
        // [PASTE YOUR EXISTING PARALLAX TICK CODE HERE]
        
        /* ── 6. INIT (Modified to hook into App.js) ── */
        requestAnimationFrame(() => {
            uiWrapper.classList.add('pop-in');
            tickParallax();
            
            // NEW: Instead of auto-recovering, we call the auth logic in app.js
            if(typeof initAuth === 'function') {
                initAuth();
            }
        });

        /* ── 7. ASSIMILATION TRANSITION (Exposed globally so app.js can call it) ── */
        window.executeAssimilation = () => {
            if (!isParallaxActive) return;
            isParallaxActive = false;
            cancelAnimationFrame(rafId);
            document.removeEventListener('mousemove', onPointerMove);
            document.removeEventListener('touchmove', onPointerMove);

            uiWrapper.style.transform = 'scale(1) rotateY(0deg) rotateX(0deg) translateZ(0)';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    uiWrapper.classList.add('pull-active');
                    if(mainFooter) mainFooter.classList.add('fade-out'); 
                });
            });

            setTimeout(() => {
                appPanel.classList.add('active');
                setTimeout(() => {
                    uiWrapper.parentNode?.removeChild(uiWrapper);
                    if(mainFooter && mainFooter.parentNode) mainFooter.parentNode.removeChild(mainFooter);
                }, 1000);
            }, 1900);
        };

        /* ── PWA INSTALL (Unchanged) ── */
        // [PASTE YOUR EXISTING DEFERRED PROMPT CODE HERE]

    })();
    </script>
</body>
</html>
