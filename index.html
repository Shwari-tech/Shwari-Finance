<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shwari Finance">
    <title>Shwari Finance · Digital Assimilation</title>
    
    <link rel="preload" as="image" href="https://shwarimoversandcleaners.co.ke/wp-content/uploads/2022/02/BOB_1049.jpg">
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: url('https://shwarimoversandcleaners.co.ke/wp-content/uploads/2022/02/BOB_1049.jpg') calc(50% + 30%) center / cover no-repeat;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            perspective: 1200px;
        }

        /* ----- ORBIT WRAPPER ----- */
        .wrapper {
            position: relative;
            width: min(500px, 92vw);
            height: min(500px, 92vw);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1.2s ease-out, transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }

        .wrapper.pop-in {
            opacity: 1;
            transform: scale(1);
        }

        /* ----- MAIN ICON (CORE) ----- */
        .main-icon {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.10),
                0 0 0 6px rgba(255,255,255,0.85),
                0 0 0 9px rgba(0,0,0,0.06);
            border: 2px solid rgba(255,255,255,0.95);
            z-index: 60;
            animation: breathe 4s ease-in-out infinite;
            will-change: transform, box-shadow;
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1) translateZ(0);
                box-shadow: 0 20px 40px rgba(0,0,0,0.10), 0 0 0 6px rgba(255,255,255,0.85), 0 0 0 9px rgba(0,0,0,0.06);
            }
            50% {
                transform: scale(1.04) translateZ(0);
                box-shadow: 0 26px 50px rgba(0,0,0,0.14), 0 0 0 8px rgba(255,255,255,0.85), 0 0 0 11px rgba(0,0,0,0.06);
            }
        }

        /* ----- PERSON ICON ----- */
        .person-icon {
            font-size: 3.5rem;
            color: #333;
            transition: opacity 0.3s ease;
        }

        /* =========================================
            ----- NEW & UPGRADED FOOTER STYLES ----- 
            ========================================= */
        .shwari-footer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            opacity: 0;
            transform: translateX(-50%) translateY(40px);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
            
            background: rgba(255, 255, 255, 0.88);
            padding: 12px 26px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08), inset 0 0 10px rgba(255,255,255,0.5);
            
            animation: footerSlideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes footerSlideUp {
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .shwari-footer.fade-out {
            opacity: 0;
            transform: translateX(-50%) translateY(20px) scale(0.95);
            pointer-events: none;
        }

        /* ----- FULLY DESIGNED ICONS (SQUARES) ----- */
        .ms-logo {
            width: 32px;
            height: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        .ms-logo span {
            border-radius: 4px;
            display: block;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6), inset 0 -2px 4px rgba(0,0,0,0.15);
            animation: iconPulse 2.5s infinite alternate ease-in-out;
            will-change: transform;
        }

        .ms-logo .sq1 { background: linear-gradient(135deg, #ff6b4a, #d1360c); animation-delay: 0.0s; }
        .ms-logo .sq2 { background: linear-gradient(135deg, #9ae200, #5c8700); animation-delay: 0.2s; }
        .ms-logo .sq3 { background: linear-gradient(135deg, #3bc0ff, #007bb5); animation-delay: 0.4s; }
        .ms-logo .sq4 { background: linear-gradient(135deg, #ffce33, #cc9400); animation-delay: 0.6s; }

        @keyframes iconPulse {
            0%   { transform: scale(1) translateY(0); }
            100% { transform: scale(1.08) translateY(-1px); }
        }

        /* ----- TEXT CONTAINER FOR STACKING ----- */
        .brand-text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 2px;
        }

        /* ----- EMBEDDED TEXT ANIMATION ----- */
        .brand-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            line-height: 1.1;
            display: flex;
            align-items: center;
            gap: 8px;
            
            background: linear-gradient(
                to right, 
                #111111 20%, 
                #2c7a47 40%, 
                #55d082 50%, 
                #2c7a47 60%, 
                #111111 80%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            
            animation: textShine 3s linear infinite, textFloat 2s ease-in-out infinite alternate;
        }

        .brand-text i {
            font-size: 1.5rem;
            color: #55d082;
            text-shadow: 0 0 8px rgba(85, 208, 130, 0.6);
            -webkit-text-fill-color: #55d082; 
        }

        .collab-text {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        @keyframes textFloat {
            0%   { filter: drop-shadow(0 0 2px rgba(85, 208, 130, 0.1)); transform: translateY(0); }
            100% { filter: drop-shadow(0 0 6px rgba(85, 208, 130, 0.3)); transform: translateY(-0.5px); }
        }
        /* ========================================= */

        /* ----- SHOCKWAVE & PARTICLES ----- */
        .shockwave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #333333;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: float 5s infinite ease-in-out;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, top, left, opacity;
        }

        .wrapper.pop-in .particle { opacity: 0.5; }

        .p1 { width: 10px; height: 10px; top: 8%;  left: 15%; background: #2c7a47; animation-duration: 4.2s; }
        .p2 { width:  6px; height:  6px; top: 78%; left: 88%; background: #555555; animation-duration: 6.0s; }
        .p3 { width: 14px; height: 14px; top: 70%; left:  8%; background: #b78a1a; animation-duration: 5.4s; }
        .p4 { width:  7px; height:  7px; top: 18%; left: 86%; background: #8e8e8e; animation-duration: 7.0s; }

        @keyframes float {
            0%, 100% { transform: translateY(0)    scale(1.0) translateZ(0); }
            50%        { transform: translateY(-15px) scale(1.1) translateZ(0); }
        }

        /* ----- ORBIT RINGS ----- */
        .orbit-inner, .orbit-outer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 40;
            transform-style: preserve-3d;
        }

        .orbit-inner {
            width: 220px; height: 220px;
            animation: rotatePulseClockwise 4s linear infinite;
        }
        .orbit-outer {
            width: 380px; height: 380px;
            z-index: 30;
            animation: rotatePulseCounter 5s linear infinite;
        }

        /* ----- ORBIT ITEMS ----- */
        .orb-fin, .orb-soc {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            will-change: transform, top, left, opacity;
        }

        .orb-fin {
            width: 48px; height: 48px;
            font-size: 1.3rem;
            border: 1.5px solid rgba(255,255,255,0.9);
            z-index: 45;
            top:  var(--y, 50%);
            left: var(--x, 50%);
            --s: 1;
            transform: translate(-50%, -50%) scale(var(--s)) translateZ(0);
            transition:
                top         0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045),
                left        0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045),
                transform   0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045),
                background  0.5s, color 0.5s, border-color 0.5s, box-shadow 0.5s;
        }

        .orb-fin:nth-child(1) { --y: 0%;   --x: 50%;  color: #b78a1a; background: #fefcf0; }
        .orb-fin:nth-child(2) { --y: 50%;  --x: 100%; color: #444444; background: #f5f5f5; }
        .orb-fin:nth-child(3) { --y: 100%; --x: 50%;  color: #4a3b8a; background: #f3f1fd; }
        .orb-fin:nth-child(4) { --y: 50%;  --x: 0%;   color: #1f6e3f; background: #f1f9ec; }

        .orb-soc {
            width: 44px; height: 44px;
            font-size: 1.3rem;
            color: #2c3e4e;
            z-index: 35;
            top: 50%; left: 50%;
            margin-top: -22px; margin-left: -22px;
            --rot: 0deg;
            --offset: 190px;
            --s: 1;
            transform: rotate(var(--rot)) translate(var(--offset)) rotate(calc(var(--rot) * -1)) scale(var(--s)) translateZ(0);
            transition:
                transform   0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045),
                background  0.5s, color 0.5s, box-shadow 0.5s;
        }

        .orb-soc:nth-child(1) { --rot: 0deg;   color: #3b5998; }
        .orb-soc:nth-child(2) { --rot: 72deg;  color: #000000; }
        .orb-soc:nth-child(3) { --rot: 144deg; color: #25D366; }
        .orb-soc:nth-child(4) { --rot: 216deg; color: #000000; }
        .orb-soc:nth-child(5) { --rot: 288deg; color: #c13584; }

        .orb-fin i, .orb-soc i {
            animation: iconPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: opacity 0.3s ease;
        }

        /* ----- FAST PULSING ROTATION KEYFRAMES ----- */
        @keyframes rotatePulseClockwise {
            0%   { transform: translate(-50%, -50%) rotate(0deg) scale(1) translateZ(0); }
            12.5%{ transform: translate(-50%, -50%) rotate(45deg) scale(0.67) translateZ(0); }
            25%  { transform: translate(-50%, -50%) rotate(90deg) scale(0.35) translateZ(0); }
            37.5%{ transform: translate(-50%, -50%) rotate(135deg) scale(0.82) translateZ(0); }
            50%  { transform: translate(-50%, -50%) rotate(180deg) scale(1.25) translateZ(0); }
            62.5%{ transform: translate(-50%, -50%) rotate(225deg) scale(0.82) translateZ(0); }
            75%  { transform: translate(-50%, -50%) rotate(270deg) scale(0.35) translateZ(0); }
            87.5%{ transform: translate(-50%, -50%) rotate(315deg) scale(0.67) translateZ(0); }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1) translateZ(0); }
        }
        
        @keyframes rotatePulseCounter {
            0%   { transform: translate(-50%, -50%) rotate(0deg) scale(1) translateZ(0); }
            12.5%{ transform: translate(-50%, -50%) rotate(-45deg) scale(0.72) translateZ(0); }
            25%  { transform: translate(-50%, -50%) rotate(-90deg) scale(0.45) translateZ(0); }
            37.5%{ transform: translate(-50%, -50%) rotate(-135deg) scale(0.8) translateZ(0); }
            50%  { transform: translate(-50%, -50%) rotate(-180deg) scale(1.15) translateZ(0); }
            62.5%{ transform: translate(-50%, -50%) rotate(-225deg) scale(0.8) translateZ(0); }
            75%  { transform: translate(-50%, -50%) rotate(-270deg) scale(0.45) translateZ(0); }
            87.5%{ transform: translate(-50%, -50%) rotate(-315deg) scale(0.72) translateZ(0); }
            100% { transform: translate(-50%, -50%) rotate(-360deg) scale(1) translateZ(0); }
        }

        @keyframes iconPop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* ----- RING TRACK (decorative dashed circles) ----- */
        .ring-track {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 1.5px dashed rgba(0,0,0,0.2);
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        .ring-track.inner { width: 220px; height: 220px; animation: pulseTrackInner 4s linear infinite; }
        .ring-track.outer { width: 380px; height: 380px; animation: pulseTrackOuter 5s linear infinite; }

        @keyframes pulseTrackInner {
            0%   { transform: translate(-50%, -50%) scale(1); }
            12.5%{ transform: translate(-50%, -50%) scale(0.67); }
            25%  { transform: translate(-50%, -50%) scale(0.35); }
            37.5%{ transform: translate(-50%, -50%) scale(0.82); }
            50%  { transform: translate(-50%, -50%) scale(1.25); }
            62.5%{ transform: translate(-50%, -50%) scale(0.82); }
            75%  { transform: translate(-50%, -50%) scale(0.35); }
            87.5%{ transform: translate(-50%, -50%) scale(0.67); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes pulseTrackOuter {
            0%   { transform: translate(-50%, -50%) scale(1); }
            12.5%{ transform: translate(-50%, -50%) scale(0.72); }
            25%  { transform: translate(-50%, -50%) scale(0.45); }
            37.5%{ transform: translate(-50%, -50%) scale(0.8); }
            50%  { transform: translate(-50%, -50%) scale(1.15); }
            62.5%{ transform: translate(-50%, -50%) scale(0.8); }
            75%  { transform: translate(-50%, -50%) scale(0.45); }
            87.5%{ transform: translate(-50%, -50%) scale(0.72); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* ----- DIGITAL ASSIMILATION EFFECT ----- */
        .wrapper.pull-active .particle {
            top: 50% !important; left: 50% !important;
            transform: translate(-50%, -50%) scale(0) !important;
            opacity: 0 !important;
            transition-duration: 0.4s !important;
        }
        .wrapper.pull-active .orb-fin {
            --y: 50% !important; --x: 50% !important; --s: 0.3 !important;
            background: #ffffff !important;
            border-color: transparent !important;
            color: transparent !important;
            box-shadow: none !important;
        }
        .wrapper.pull-active .orb-soc {
            --offset: 0px !important; --s: 0.3 !important;
            background: #ffffff !important;
            color: transparent !important;
            box-shadow: none !important;
        }
        .wrapper.pull-active .orb-fin i,
        .wrapper.pull-active .orb-soc i { opacity: 0; transition-duration: 0.3s; }

        .wrapper.pull-active .person-icon { opacity: 0; transition-delay: 0.85s; }

        .wrapper.pull-active .main-icon {
            animation: breathe 4s ease-in-out infinite, dataProcess 1.2s cubic-bezier(0.6, -0.28, 0.735, 0.045) 0.9s forwards;
        }
        .wrapper.pull-active .shockwave {
            animation: rippleOut 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.0s forwards;
        }

        @keyframes dataProcess {
            0%   { transform: scale(1);   border-color: white;       }
            35%  { transform: scale(0.6); box-shadow: 0 0 30px #555; border-color: #333; filter: brightness(0.9); }
            58%  { transform: scale(1.4); box-shadow: 0 0 50px #222; background: #ffffff; border-color: transparent; }
            60%  {                        box-shadow: none; border: none; }
            100% { transform: scale(40);  background: #ffffff; box-shadow: none; border: none; opacity: 1; }
        }

        @keyframes rippleOut {
            0%   { transform: translate(-50%, -50%) scale(1);  opacity: 1; border-width: 15px; border-color: #333; }
            100% { transform: translate(-50%, -50%) scale(30); opacity: 0; border-width: 0px;  border-color: #000; }
        }

        /* ----- DASHBOARD IFRAME ----- */
        .app {
            position: fixed;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            background: #ffffff;
            z-index: 2000;
            transition: opacity 0.6s ease-in;
        }
        .app.active { opacity: 1; visibility: visible; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 500px) {
            .main-icon { width: 96px; height: 96px; }
            .orbit-inner { width: 190px; height: 190px; }
            .ring-track.inner { width: 190px; height: 190px; }
            .orb-fin { width: 42px; height: 42px; font-size: 1.2rem; }
            .orbit-outer { width: 300px; height: 300px; }
            .ring-track.outer { width: 300px; height: 300px; }
            .orb-soc { width: 38px; height: 38px; font-size: 1.1rem; --offset: 150px; }
            
            /* Responsive adjustments for new footer */
            .shwari-footer { padding: 10px 18px; gap: 12px; }
            .brand-text { font-size: 1.5rem; letter-spacing: 0.8px; } 
            .collab-text { font-size: 0.65rem; }
            .ms-logo { width: 28px; height: 28px; }
        }

        /* ----- FORCED INSTALL OVERLAY ----- */
        #forcedInstall {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .install-card {
            background: white;
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: cardSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardSlideUp {
            from { transform: translateY(50px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .install-card > i {
            font-size: 4rem;
            color: #222;
            margin-bottom: 25px;
            display: block;
        }

        .install-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 12px;
        }

        .install-card p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .install-btn {
            background: transparent;
            color: #222;
            border: 2px solid #222;
            padding: 18px 0;
            width: 100%;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .install-btn:active {
            transform: scale(0.96);
            background: rgba(0,0,0,0.05);
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1);    opacity: 1;   }
            50%        { transform: scale(1.05); opacity: 0.6; }
        }
    </style>
    <style>
        /* Reduce all text & rem-based font sizes to extremely small */
        html {
            font-size: 5px !important;
        }
        /* Optional: ensure any absolute font-sizes remain scaled down but keep consistency */
        body, .wrapper, .shwari-footer, .install-card, .orb-fin, .orb-soc, .install-btn, .main-icon .person-icon {
            /* inherits from root */
        }
    </style>
</head>
<body>

    <div class="wrapper" id="ui">

        <div class="shockwave"></div>

        <div class="ring-track inner"></div>
        <div class="ring-track outer"></div>

        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>

        <div class="main-icon">
            <i class="fas fa-user person-icon"></i>
        </div>

        <div class="orbit-inner">
            <div class="orb-fin"><i class="fas fa-coins"></i></div>
            <div class="orb-fin"><i class="fas fa-file-invoice-dollar"></i></div>
            <div class="orb-fin"><i class="fas fa-calculator"></i></div>
            <div class="orb-fin"><i class="fas fa-money-bill-wave"></i></div>
        </div>

        <div class="orbit-outer">
            <div class="orb-soc"><i class="fab fa-facebook-f"></i></div>
            <div class="orb-soc"><i class="fab fa-x-twitter"></i></div>
            <div class="orb-soc"><i class="fab fa-whatsapp"></i></div>
            <div class="orb-soc"><i class="fab fa-threads"></i></div>
            <div class="orb-soc"><i class="fab fa-instagram"></i></div>
        </div>
    </div>

    <div class="app" id="app">
        <iframe id="macro-frame"
            src="https://script.google.com/macros/s/AKfycbyfWRNzWAIdwm30l4I_M_Wj6FlVT2ToNY1LjJr3riHiud5Y2JnFw8XfrHwZBtKjZQwY/exec">
        </iframe>
    </div>

    <div id="forcedInstall">
        <div class="install-card">
            <i class="fas fa-mobile-screen-button"></i>
            <h2>Install Shwari Finance</h2>
            <p>To access your dashboard and secure financial tools, please install this application to your phone.</p>
            <button class="install-btn" id="installAction" style="animation: breathe 2s infinite;">
                <i class="fas fa-download"></i>
                <span style="animation: pulseText 1.5s infinite ease-in-out; display: inline-block;">Install Now</span>
            </button>
        </div>
    </div>

    <script>
    (function () {
        "use strict";

        /* ── 1. SERVICE WORKER ── */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(r  => console.log('SW registered:', r.scope))
                    .catch(e => console.error('SW failed:', e));
            });
        }

        /* ── 2. SESSION CACHE ── */
        const USER_DATA_KEY = 'shwari_secure_session';

        const cacheUserSession = (userName) => {
            const data = {
                name: userName,
                lastActive: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),
                timestamp: Date.now()
            };
            localStorage.setItem(USER_DATA_KEY, JSON.stringify(data));
            if ('caches' in window) {
                caches.open('shwari-user-cache').then(c =>
                    c.put('/user-session.json', new Response(JSON.stringify(data)))
                );
            }
        };

        /* ── 3. SESSION RECOVERY ── */
        const recoverSession = async () => {
            let session = null;
            const local = localStorage.getItem(USER_DATA_KEY);
            if (local) {
                session = JSON.parse(local);
            } else if ('caches' in window) {
                try {
                    const cache = await caches.open('shwari-user-cache');
                    const res   = await cache.match('/user-session.json');
                    if (res) session = await res.json();
                } catch (e) { console.warn('Deep cache read failed'); }
            }

            if (session && session.name) {
                cacheUserSession(session.name);
                if (!transitionTriggered) {
                    transitionTriggered = true;
                    setTimeout(executeTransition, 1500);
                }
            } else {
                cacheUserSession('Employee');
            }
        };

        /* ── 4. UI REFS & CACHE BUSTING ── */
        const uiWrapper   = document.getElementById('ui');
        const appPanel    = document.getElementById('app');
        const macroIframe = document.getElementById('macro-frame');
        const mainFooter  = document.getElementById('main-footer');

        // Force latest Apps Script version by appending timestamp to bypass browser cache
        const baseSrc = macroIframe.src;
        macroIframe.src = baseSrc + (baseSrc.includes('?') ? '&' : '?') + 'cb=' + new Date().getTime();

        /* ── 5. STABLE PARALLAX ──
               Uses a single rAF loop with lerp for smooth, jank-free movement.
               Clamped so the wrapper never tilts more than ±8°.            */
        let isParallaxActive = true;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let rafId;
        let transitionTriggered = false;

        const MAX_TILT = 8; // degrees

        const onPointerMove = (e) => {
            if (!isParallaxActive) return;
            const cx = e.clientX ?? e.touches?.[0]?.clientX ?? window.innerWidth  / 2;
            const cy = e.clientY ?? e.touches?.[0]?.clientY ?? window.innerHeight / 2;
            targetX = Math.max(-MAX_TILT, Math.min(MAX_TILT, (window.innerWidth  / 2 - cx) / 35));
            targetY = Math.max(-MAX_TILT, Math.min(MAX_TILT, (window.innerHeight / 2 - cy) / 35));
        };

        const lerp = (a, b, t) => a + (b - a) * t;

        const tickParallax = () => {
            if (!isParallaxActive) return;
            currentX = lerp(currentX, targetX, 0.07);
            currentY = lerp(currentY, targetY, 0.07);
            // Only write to DOM when the change is visible (> 0.005°)
            if (Math.abs(currentX - targetX) > 0.005 || Math.abs(currentY - targetY) > 0.005) {
                uiWrapper.style.transform =
                    `scale(1) rotateY(${currentX.toFixed(3)}deg) rotateX(${currentY.toFixed(3)}deg) translateZ(0)`;
            }
            rafId = requestAnimationFrame(tickParallax);
        };

        document.addEventListener('mousemove', onPointerMove, { passive: true });
        document.addEventListener('touchmove', onPointerMove, { passive: true });

        /* ── 6. INIT ── */
        requestAnimationFrame(() => {
            uiWrapper.classList.add('pop-in');
            tickParallax();
            recoverSession();
        });

        /* ── 7. ASSIMILATION TRANSITION ── */
        const executeTransition = () => {
            if (!isParallaxActive) return;
            isParallaxActive = false;
            cancelAnimationFrame(rafId);
            document.removeEventListener('mousemove', onPointerMove);
            document.removeEventListener('touchmove', onPointerMove);

            // Reset to neutral before playing the pull animation
            uiWrapper.style.transform = 'scale(1) rotateY(0deg) rotateX(0deg) translateZ(0)';

            // Small delay so the neutral reset is painted first
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    uiWrapper.classList.add('pull-active');
                    // Fade out the footer when the main transition starts
                    if(mainFooter) mainFooter.classList.add('fade-out'); 
                });
            });

            setTimeout(() => {
                appPanel.classList.add('active');
                setTimeout(() => {
                    uiWrapper.parentNode?.removeChild(uiWrapper);
                    if(mainFooter && mainFooter.parentNode) mainFooter.parentNode.removeChild(mainFooter);
                }, 1000);
            }, 1900);
        };

        /* ── 8. TRIGGER GUARDS ── */
        macroIframe.addEventListener('load', () => {
            if (!transitionTriggered) {
                transitionTriggered = true;
                setTimeout(executeTransition, 5000);
            }
        });

        setTimeout(() => {
            if (!transitionTriggered) {
                transitionTriggered = true;
                executeTransition();
            }
        }, 15000);

        /* ── 9. PWA INSTALL ── */
        let deferredPrompt;
        const installOverlay = document.getElementById('forcedInstall');
        const installBtn     = document.getElementById('installAction');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installOverlay.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installOverlay.style.display = 'none';
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installOverlay.style.display = 'none';
            console.log('Shwari Finance installed.');
        });

    })();
    </script>
</body>
</html>
